name: DualAgent
options:
  bundleIdPrefix: com.duckets
  xcodeVersion: "15.4"
settings:
  baseProductBundleIdentifier: com.duckets.DualAgent
packages:
  LDSwiftEventSource:
    url: https://github.com/launchdarkly/swift-eventsource
    from: "1.0.0"
  swift-markdown-ui:
    url: https://github.com/gonzalezreal/swift-markdown-ui
    from: "2.0.0"
  Splash:
    url: https://github.com/JohnSundell/Splash
    from: "0.11.0"
  Highlightr:
    url: https://github.com/raspu/Highlightr
    from: "2.1.0"
  KeychainAccess:
    url: https://github.com/kishikawakatsumi/KeychainAccess
    from: "4.2.2"
targets:
  DualAgent:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: DualAgent
        excludes:
          - "Theme 2.swift"
    dependencies:
      - target: DualAgentLiveActivityWidget
        embed: true
      - package: LDSwiftEventSource
      - package: swift-markdown-ui
        product: MarkdownUI
      - package: Splash
      - package: Highlightr
      - package: KeychainAccess
    settings:
      INFOPLIST_FILE: DualAgent/Resources/Info.plist
      SWIFT_VERSION: "5.9"
      ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: YES
      DEFINES_MODULE: YES
      CLANG_ENABLE_MODULES: YES
      CODE_SIGN_IDENTITY: ""
      CODE_SIGNING_REQUIRED: NO
      CODE_SIGNING_ALLOWED: NO
  DualAgentLiveActivityWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - DualAgentLiveActivityWidget
      - DualAgent/LiveActivities/AgentRunActivityAttributes.swift
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.duckets.DualAgent.LiveActivityWidget
      INFOPLIST_FILE: DualAgentLiveActivityWidget/Info.plist
      CODE_SIGN_ENTITLEMENTS: DualAgentLiveActivityWidget/LiveActivityWidget.entitlements
      SWIFT_VERSION: "5.9"
      CODE_SIGN_IDENTITY: ""
      CODE_SIGNING_REQUIRED: NO
      CODE_SIGNING_ALLOWED: NO
