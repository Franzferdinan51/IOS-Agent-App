name: DualAgent
options:
  bundleIdPrefix: com.duckets
  # We'll set the target platform in the target
settings: {}
targets:
  DualAgent:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    info: Info.plist
    sources:
      - DualAgent
      - Auth
      - Config
      - DesignSystem
      - Features
      - Models
      - Networking
      - Persistence
      - Resources
    dependencies:
      - carthage: LDSwiftEventSource
      - carthage: swift-markdown-ui
      - carthage: Splash
      - carthage: Highlightr
      - carthage: KeychainAccess
    settings:
      INFOPLIST_FILE: Info.plist
      SWIFT_VERSION: "5.9"
      ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: YES
      DEFINES_MODULE: YES
      # Enable testing
      CLANG_ENABLE_MODULES: YES
      # Other settings as needed
packages:
  LDSwiftEventSource:
    url: https://github.com/leifd/LDSwiftEventSource
    from: "1.0.0"
  swift-markdown-ui:
    url: https://github.com/gonzalezreal/swift-markdown-ui
    from: "2.0.0"
  Splash:
    url: https://github.com/johnsundell/splash
    from: "0.18.0"
  Highlightr:
    url: https://github.com/raspu/Highlightr
    from: "2.1.0"
  KeychainAccess:
    url: https://github.com/kishikawakatsumi/KeychainAccess
    from: "4.2.2"