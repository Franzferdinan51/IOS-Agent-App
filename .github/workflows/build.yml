name: Build iOS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Show available simulators
        run: xcrun simctl list devices available | grep -E "iPhone|iPad" | head -5

      - name: Show repo structure
        run: ls -la && ls DualAgent/ | head -10

      - name: Generate Xcode project
        run: |
          if [ -f "project.yml" ]; then
            brew install xcodegen
            xcodegen generate
          fi

      - name: Resolve SPM dependencies
        run: |
          xcodebuild -project DualAgent.xcodeproj \
            -scheme DualAgent \
            -resolvePackageDependencies 2>&1 | tail -20

      - name: Build for iOS Simulator
        run: |
          xcodebuild -project DualAgent.xcodeproj \
            -scheme DualAgent \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 15 Pro' \
            build 2>&1 | tail -40

      - name: Upload build artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            ~/Library/Logs/DualAgent/*.log
            build/**/*.log
          retention-days: 5
