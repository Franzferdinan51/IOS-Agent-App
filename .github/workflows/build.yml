name: Build iOS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Show available simulators
        run: xcrun simctl list devices available | grep -E "iPhone|iPad" | head -5

      - name: Generate Xcode project (only if project.yml changed)
        run: |
          if [ -f "project.yml" ] && ! git diff --name-only HEAD~1 | grep -q "project.yml"; then
            echo "project.yml unchanged, skipping xcodegen"
          else
            echo "Regenerating project..."
            brew install xcodegen
            xcodegen generate
          fi

      - name: Build for iOS Simulator
        run: |
          xcodebuild -project DualAgent.xcodeproj \
            -scheme DualAgent \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 15 Pro' \
            build 2>&1 | tail -40

      - name: Upload build artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            ~/Library/Logs/DualAgent/*.log
            build/**/*.log
          retention-days: 5
